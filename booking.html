<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking - Travel Website</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/boxicons@latest/css/boxicons.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Paytone+One&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <a href="index.html" class="logo">Travel</a>
      <ul class="navbar">
        <li><a href="index.html#home">Home</a></li>
        <li><a href="index.html#package">Packages</a></li>
        <li><a href="index.html#destination">Destinations</a></li>
        <li><a href="index.html#contribution">Contributors</a></li>
        <li><a href="index.html#contact">Contact Us</a></li>
      </ul>
      <div id="menu-icon"><i class="bx bx-menu"></i></div>
    </header>
    <section class="book" id="book">
      <div class="book-container">
        <h1 class="booking-title">Book Your Adventure</h1>
        <p class="booking-subtitle">
          Fill in your details to reserve your spot
        </p>

        <div class="form-container">
          <form action="index.html" class="booking-form">
            <div class="form-row">
              <div class="inputBox">
                <label for="name"> <i class="bx bx-user"></i> Full Name </label>
                <input
                  type="text"
                  id="name"
                  name="name"
                  placeholder="Enter your full name"
                  required
                />
              </div>

              <div class="inputBox">
                <label for="email">
                  <i class="bx bx-envelope"></i> Email Address
                </label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="your.email@example.com"
                  required
                />
              </div>
            </div>

            <div class="form-row">
              <div class="inputBox">
                <label for="phone">
                  <i class="bx bx-phone"></i> Phone Number
                </label>
                <input
                  type="tel"
                  id="phone"
                  name="phone"
                  placeholder="+91 1234567890"
                  required
                />
              </div>

              <div class="inputBox">
                <label for="persons">
                  <i class="bx bx-group"></i> Number of Guests
                </label>
                <input
                  type="number"
                  id="persons"
                  name="persons"
                  placeholder="1"
                  min="1"
                  max="20"
                  required
                />
              </div>
            </div>

            <div class="form-row">
              <div class="inputBox">
                <label for="arrival">
                  <i class="bx bx-calendar-check"></i> Arrival Date
                </label>
                <input type="date" id="arrival" name="arrival" required />
              </div>

              <div class="inputBox">
                <label for="departure">
                  <i class="bx bx-calendar"></i> Departure Date
                </label>
                <input type="date" id="departure" name="departure" required />
              </div>
            </div>

            <div class="inputBox">
              <label for="package">
                <i class="bx bx-package"></i> Select Package
              </label>
              <select id="package" name="package" class="select-input" required>
                <option value="">Choose a package</option>
                <option value="manali">Manali - ₹12,000</option>
                <option value="shimla">Shimla - ₹15,000</option>
                <option value="nainital">Nainital - ₹10,000</option>
                <option value="custom">Custom Package</option>
              </select>
            </div>

            <div class="inputBox">
              <label for="special">
                <i class="bx bx-edit-alt"></i> Special Requests (Optional)
              </label>
              <textarea
                id="special"
                name="special"
                rows="3"
                placeholder="Any special requirements or requests..."
              ></textarea>
            </div>

            <button type="submit" class="btn-submit">
              <i class="bx bx-check"></i> Confirm Booking
            </button>
          </form>
        </div>
      </div>
    </section>
    <script src="style.js"></script>
  </body>
</html>
